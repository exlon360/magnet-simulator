name: Build Magnet Simulator IPA

on:
  workflow_dispatch:
  push:
    tags:
      - "magnetsim-v*"

permissions:
  contents: read

jobs:
  unsigned-ipa:
    name: Build unsigned Magnet Simulator IPA
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned IPA
        run: bash scripts/build_magnet_simulator_unsigned_ipa.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MagnetSimulator-unsigned-ipa
          path: build/magnet-simulator-unsigned-ipa/MagnetSimulator-unsigned.ipa
          if-no-files-found: error

      - name: Publish IPA to GitHub Release
        if: startsWith(github.ref, 'refs/tags/magnetsim-v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/magnet-simulator-unsigned-ipa/MagnetSimulator-unsigned.ipa
          generate_release_notes: true
